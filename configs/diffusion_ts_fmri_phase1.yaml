# Diffusion-TS config for BS-NET Signal Recovery — Phase 1
# Based on Config/fmri.yaml with adjustments for:
#   - harvard_oxford atlas (48 ROI instead of 50)
#   - seq_length 180 TR (450s) instead of 24
#   - Data: ds000243 concatenated training subjects
#
# Usage:
#   cd external/Diffusion-TS
#   python main.py --config_file ../../configs/diffusion_ts_fmri_phase1.yaml \
#       --train --name bsnet_phase1 --gpu 0

model:
  target: Models.interpretable_diffusion.gaussian_diffusion.Diffusion_TS
  params:
    seq_length: 180
    feature_size: 48             # harvard_oxford ROI count
    n_layer_enc: 4
    n_layer_dec: 4
    d_model: 96
    timesteps: 1000
    sampling_timesteps: 1000
    loss_type: 'l1'
    beta_schedule: 'cosine'
    n_heads: 4
    mlp_hidden_times: 4
    attn_pd: 0.0
    resid_pd: 0.0
    kernel_size: 5
    padding_size: 2

solver:
  base_lr: 1.0e-5
  max_epochs: 10000             # Reduced from 15000 (larger windows = more data per epoch)
  results_folder: ./Checkpoints_bsnet_phase1
  gradient_accumulate_every: 4  # Increased for memory (longer sequences)
  save_cycle: 1000
  ema:
    decay: 0.995
    update_interval: 10

  scheduler:
    target: engine.lr_sch.ReduceLROnPlateauWithWarmup
    params:
      factor: 0.5
      patience: 2000
      min_lr: 1.0e-5
      threshold: 1.0e-1
      threshold_mode: rel
      warmup_lr: 8.0e-4
      warmup: 500
      verbose: False

dataloader:
  train_dataset:
    target: Utils.Data_utils.real_datasets.fMRIDataset
    params:
      name: bsnet_fmri
      proportion: 1.0            # All data for training (test subjects already separated)
      data_root: ../../data/ds000243/signal_recovery/harvard_oxford/diffusion_ts_data
      window: 180                # seq_length
      save2npy: True
      neg_one_to_one: True
      seed: 42
      period: train

  test_dataset:
    target: Utils.Data_utils.real_datasets.fMRIDataset
    params:
      name: bsnet_fmri
      proportion: 0.9
      data_root: ../../data/ds000243/signal_recovery/harvard_oxford/diffusion_ts_data
      window: 180
      save2npy: True
      neg_one_to_one: True
      seed: 42
      period: test
      style: separate
      distribution: geometric
    coefficient: 1.0e-2           # coef for langevin guidance
    step_size: 5.0e-2             # stepsize for langevin
    sampling_steps: 250

  batch_size: 16                  # Reduced from 64 (180 TR vs 24 TR → ~7.5x memory)
  sample_size: 64                 # Reduced from 256
  shuffle: True
